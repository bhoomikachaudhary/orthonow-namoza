<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyderabad – Gachibowli | OrthoNow</title>
<link rel="stylesheet" href="styles.css">
</head>
<!-- Individual clinic page for Hyderabad – Gachibowli.
     This file gives the repo 9 distinct clinic HTML files (one per
     clinic, as the brief requires). It immediately delegates to the
     shared clinic.html?id=hyd-gachibowli template which holds all the logic,
     the Call Now button, the view_clinic_page dataLayer push, and
     the all-locations nav. In a real WordPress build each of these
     would be a full standalone page rendered by the CMS template
     engine — this pattern mirrors that without copy-pasting 9
     identical blocks of markup. -->
<body>
<script>
  // Redirect before first paint — no visible flash.
  window.location.replace('clinic.html?id=hyd-gachibowli');
</script>
<noscript>
  <meta http-equiv="refresh" content="0;url=clinic.html?id=hyd-gachibowli">
</noscript>
</body>
</html>
